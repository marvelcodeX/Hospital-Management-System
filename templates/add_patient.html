{% extends "base.html" %}

{% block title %}Add Patient | Sanjeevini HMS{% endblock %}
{% block page_title %}Add Patient{% endblock %}
{% block page_description %}Create a patient record and save it to the CSV file.{% endblock %}

{% block content %}
    <section class="panel">
        <form method="POST" action="{{ url_for('add_patient') }}" class="form-grid">
            <div>
                <label for="id">Patient ID</label>
                <input type="text" id="id" name="id" placeholder="Example: 8" required>
            </div>

            <div>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Example: Meera Nair" required>
            </div>

            <div>
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="0" max="120" placeholder="Example: 32" required>
            </div>

            <div>
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select gender</option>
                    <option>Female</option>
                    <option>Male</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="span-2">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Street, city" required>
            </div>

            <div>
                <label for="emergency_contact">Emergency Contact</label>
                <input type="tel" id="emergency_contact" name="emergency_contact" placeholder="10 digit phone number" required>
            </div>

            <div>
                <label for="blood_group">Blood Group</label>
                <select id="blood_group" name="blood_group" required>
                    <option value="">Select blood group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                </select>
            </div>

            <div>
                <label for="medical_conditions">Medical Conditions</label>
                <input type="text" id="medical_conditions" name="medical_conditions" placeholder="Example: Diabetes" required>
            </div>

            <div>
                <label for="allergies">Allergies</label>
                <input type="text" id="allergies" name="allergies" placeholder="Example: None" required>
            </div>

            <div>
                <label for="doctor_allotted">Doctor Allotted</label>
                <input type="text" id="doctor_allotted" name="doctor_allotted" placeholder="Example: Dr. Priya Sharma" required>
            </div>

            <div>
                <label for="date_visited">Date Visited</label>
                <input type="date" id="date_visited" name="date_visited" required>
            </div>

            <div class="form-actions span-2">
                <button class="primary-button" type="submit">Save Patient</button>
            </div>
        </form>
    </section>
{% endblock %}
